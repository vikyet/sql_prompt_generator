# Copy to application-local.yml and set your MySQL credentials.
# Run with: --spring.profiles.active=local  (or set SPRING_PROFILES_ACTIVE=local)
# application-local.yml is gitignored and must not be committed.
spring:
  datasource:
    url: jdbc:mysql://localhost:3306/finance_db?useSSL=false&allowPublicKeyRetrieval=true
    username: your_mysql_username
    password: your_mysql_password
