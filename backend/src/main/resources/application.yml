# Finance Backend - Use env vars for secrets (e.g. SPRING_DATASOURCE_PASSWORD)
spring:
  application:
    name: finance-backend
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/finance_db?useSSL=false&allowPublicKeyRetrieval=true}
    username: ${SPRING_DATASOURCE_USERNAME:finance_user}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      connection-timeout: 5000
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        default_schema: ${SPRING_JPA_DEFAULT_SCHEMA:}
        order_inserts: true
        order_updates: true
        jdbc:
          batch_size: 25
    open-in-view: false
    database-platform: org.hibernate.dialect.MySQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration

# Observability - token/latency can be wired here when integrating with Spring AI
management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus
  metrics:
    tags:
      application: ${spring.application.name}

server:
  port: ${SERVER_PORT:8080}

# Query timeout for AI-originated reads (prevents long-running queries)
app:
  query:
    timeout-seconds: 30
  agent:
    api-key: ${AGENT_API_KEY:}
